name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # or master, whatever your default branch is

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: softball-bracket  # your subfolder

      - name: Build
        run: npm run build
        working-directory: softball-bracket

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: softball-bracket/dist  # Vite outputs to /dist
          publish_branch: gh-pages            # ensure it writes to gh-pages
          keep_files: false